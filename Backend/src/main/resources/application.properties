spring.application.name=backend
server.port=8080

# ===============================
# DEBUG SPRING SECURITY
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# CONFIGURACIÓN SENDGRID
# ===============================
spring.sendgrid.api-key=${SENDGRID_API_KEY}
spring.sendgrid.from-email=reporteloy@tudominio.com
spring.sendgrid.from-name=Reporterlo

# ===============================


spring.datasource.url=jdbc:mysql://localhost:3306/reportelo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

 
google.credentials.path=google-credentials.json


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret.key=${JWT_SECRET_KEY}
jwt.expiration.ms=28800000


# Tamaño máximo archivo
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta configurable
app.upload.dir=C:/reporteloya/uploads
app.base-url=http://localhost:8080





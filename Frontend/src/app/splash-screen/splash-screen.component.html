<div class="splash-container">
  <div class="bg-gradient"></div>
  <canvas #threeCanvas class="particle-canvas"></canvas>

  <div class="scan-line"></div>

  <div class="corner-frame top-left">
    <div class="corner-horizontal"></div>
    <div class="corner-vertical"></div>
    <div class="corner-dot"></div>
  </div>
  <div class="corner-frame top-right">
    <div class="corner-horizontal"></div>
    <div class="corner-vertical"></div>
    <div class="corner-dot"></div>
  </div>
  <div class="corner-frame bottom-left">
    <div class="corner-horizontal"></div>
    <div class="corner-vertical"></div>
    <div class="corner-dot"></div>
  </div>
  <div class="corner-frame bottom-right">
    <div class="corner-horizontal"></div>
    <div class="corner-vertical"></div>
    <div class="corner-dot"></div>
  </div>

  <div class="content-wrapper">
    <div class="logo-container" #logoContainer>
      <div class="logo-glow-ring"></div>
      <div class="energy-ring"></div>

      <div class="logo-fragment fragment-1"></div>
      <div class="logo-fragment fragment-2"></div>
      <div class="logo-fragment fragment-3"></div>
      <div class="logo-fragment fragment-4"></div>
      <div class="logo-fragment fragment-5"></div>
      <div class="logo-fragment fragment-6"></div>
      <div class="logo-fragment fragment-7"></div>
      <div class="logo-fragment fragment-8"></div>
      <div class="logo-fragment fragment-9"></div>
      <div class="logo-fragment fragment-10"></div>
      <div class="logo-fragment fragment-11"></div>
      <div class="logo-fragment fragment-12"></div>

      <div class="logo-core">
        <img src="assets/images/LogoNuevo2.png" alt="Reportelo Ya" class="logo-img" />
      </div>

      <div class="orbit-ring ring-1"></div>
      <div class="orbit-ring ring-2"></div>
      <div class="orbit-ring ring-3"></div>
    </div>

    <div class="text-container">
      <h1 class="title-text">
        <span class="title-char">R</span>
        <span class="title-char">e</span>
        <span class="title-char">p</span>
        <span class="title-char">o</span>
        <span class="title-char">r</span>
        <span class="title-char">t</span>
        <span class="title-char">e</span>
        <span class="title-char">l</span>
        <span class="title-char">o</span>
        <span class="space-char">&nbsp;</span>
        <span class="title-char accent">Y</span>
        <span class="title-char accent">a</span>
      </h1>

      <p class="tagline">Sistema de Reportes de Tránsito - Armenia Quindio</p>

      <p class="subtitle">Movilidad Urbana</p>
    </div>
  </div>

  <div class="bottom-glow"></div>

  <div class="loading-indicator">
    <div class="loading-bar"></div>
  </div>
</div>

spring.application.name=backend
server.port=8080

# ===============================
# DEBUG SPRING SECURITY
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.env=DEBUG
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/reportelo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1305
google.credentials.path=google-credentials.json

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret.key=${JWT_SECRET_KEY}

jwt.expiration.base.ms=3600000
jwt.multiplier.admin=120
jwt.multiplier.agente=120
jwt.multiplier.ciudadano=5


# Tamaño máximo archivo
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta configurable
app.upload.dir=C:/reporteloya/uploads
app.base-url=http://localhost:8080

# Verificación de correo
app.verification.url=http://localhost:4200/verificar-correo





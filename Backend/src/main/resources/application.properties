spring.application.name=backend
server.port=8080

# ===============================
# DEBUG SPRING SECURITY
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.env=DEBUG
# ===============================

# ===============================
# DATASOURCE - AIVEN MYSQL
# ===============================
spring.datasource.url=jdbc:mysql://reporteloya-davyz2006-bbb8.k.aivencloud.com:11438/defaultdb?ssl-mode=REQUIRED&requireSSL=true&verifyServerCertificate=false
spring.datasource.username=avnadmin
spring.datasource.password=${PASSWORD_BD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

google.credentials.path=google-credentials.json

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


<div class="container">
  <div class="reset-container">
    <h2>RESTABLECER CONTRASEÑA</h2>

    <p *ngIf="contadorTexto" class="contador">{{ contadorTexto }}</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="Nueva contraseña"
        />
        <i class="fa-solid fa-eye eye-icon" (click)="togglePassword('password')"></i>
      </div>

      <!-- Indicadores de seguridad -->
      <ul class="password-requirements">
        <li [class.valid]="validLength">Mínimo 8 caracteres</li>
        <li [class.valid]="validUpper">Al menos una letra mayúscula</li>
        <li [class.valid]="validNumber">Al menos un número</li>
        <li [class.valid]="validSymbol">Al menos un símbolo (@$!%*?&)</li>
      </ul>

      <div class="input-group">
        <input
          [type]="mostrarConfirm ? 'text' : 'password'"
          formControlName="confirmPassword"
          placeholder="Confirmar contraseña"
        />
        <i class="fa-solid fa-eye eye-icon" (click)="togglePassword('confirmPassword')"></i>
      </div>

      <p *ngIf="form.value.confirmPassword">
        <span [class.valid]="passwordsMatch" [class.invalid]="!passwordsMatch">
          {{ passwordsMatch ? 'Las contraseñas coinciden ✔' : 'Las contraseñas no coinciden ❌' }}
        </span>
      </p>

      <a routerLink="/login"><i class="bx bx-arrow-back"></i> Volver a login</a>

      <button type="submit" class="btn-tercero" [disabled]="!validLength || !validUpper || !validNumber || !validSymbol || !passwordsMatch || loading">
        {{ loading ? 'Procesando...' : 'Guardar' }}
      </button>

    </form>
  </div>
</div>
